
<div class="catalog-wrapper">

    <div class="catalog-header">
        <div class="container">
            <div class="hello-text">
                <img src="/static/logos/mountain/icons8-гора-100.png" alt="icon-mountain">
                <p>Каталог</p>
                
            </div>
            <div class="resort-filters">
                <div class="dropdown">
                    <button class="dropdown-btn" 
                        data-toggle="difficulty-dropdown" 
                        aria-haspopup="listbox" 
                        aria-expanded="false" 
                        aria-controls="difficulty-dropdown-menu">
                        <span id="selected-value">Все уровни</span>
                        <svg class="arrow" width="12" height="8" viewBox="0 0 12 8" aria-hidden="true">
                            <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                    </button> 
                    <div class="dropdown-menu" id="dropdown-menu"  role="listbox">

                        <div class="dropdown-item active" 
                            data-value="Все уровни" 
                            role="option" 
                            aria-selected="true">
                            Все уровни
                        </div>
                        <div class="dropdown-item"  
                            data-value="beginners" 
                            role="option"
                            aria-selected="false">
                            Начинающий
                        </div>
                        <div class="dropdown-item" 
                            data-value="medium" 
                            role="option"
                            aria-selected="false">
                            Средний 
                        </div>
                        <div class="dropdown-item" 
                            data-value="advanced" 
                            role="option"
                            aria-selected="false">
                            Продвинутый 
                        </div>
                        <div class="dropdown-item" 
                            data-value="expert" 
                            role="option"
                            aria-selected="false">
                            Эксперт
                        </div>
                    </div>
                </div>
                <div class="catalog-search">
                    <input class="input-search" type="search" placeholder="Поиск по названию или локации" aria-label="Поиск туров">
                </div>
                <button class="search-btn">
                    <span>Искать</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="10" cy="10" r="7"/>
                        <line x1="15" y1="15" x2="21" y2="21"/>
                    </svg>
                </button>

            </div>
        </div>

    </div>
    <div class="container">
        <div id="resorts-container" class="resorts-grid">
            <!-- resort cards are generated dynamically via JavaScript; the static prototype below
                 is kept for reference but could be removed in production -->
            
        </div>
    </div>
    

    <template id="resort-card-template">
        <article class="resorts-card">
            <div class="card-image-wrapper">
                <img src="" alt="" loading="lazy" data-field="image">
                <div class="resorts-levels" aria-hidden="true"></div>
            </div>
            <div class="card-content">
                <h2 class="card-title" data-field="card-name"></h2>
                <div class="card-location">
                    <svg class="location-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span class="location-text" data-field="location"></span>
                </div>

                <div class="card-info">
                    <div class="hero-info-block">
                        <p data-field="hero-info">
                            Олимпийский объект с оборудованием мирового 
                            класса и потрясающим видом на Черное море. 
                            Обширная территория подходит для всех уровней подготовки.
                        </p>
                    </div>
                    <div class="info-block">
                        <div class="info-child-1">
                            <div class="tour-height">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="None" 
                                stroke="blue" stroke-width="2" aria-hidden="true">
                                    <path d="M8 3l4 8 5-5 5 15H2L8 3z"/>
                                </svg>
                                <span class="title">Высота курорта</span>
                                <span class="height-info info" data-field="peak-height"></span>
                            </div>
    
                            <div class="trails">
                                <svg width="24" height="24" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                                    <polyline points="10,60 25,45 40,55 55,35 70,20" 
                                                fill="none" 
                                                stroke="#22c55e" 
                                                stroke-width="5" 
                                                stroke-linecap="round" 
                                                stroke-linejoin="round"/>
                                    <polyline points="60,20 70,20 70,30" 
                                                fill="none" 
                                                stroke="#22c55e" 
                                                stroke-width="5" 
                                                stroke-linecap="round" 
                                                stroke-linejoin="round"/>
                                </svg>
    
                                <span class="title">Количество трасс</span>
                                <span class="count-trails info" data-field="trail-count"></span>
    
                                
                            
                                
                            </div>
                            
                            <div class="lenght-trails">
                                <img src="/static/logos/metr.png" alt="">
                                <span class="title">Километраж трасс</span><span class="info" data-field="length"></span>
                            </div>
                        </div>
                        <div class="info-child-2">
                        </div>
                    </div>
                </div>
            </div>
        </article>
    </template>
    <div id="review-modal" class="review-modal">
        <div class="review-modal__content">
            <div class="review-modal__header">
                <h2>Отзыв о курорте</h2>
                <span class="close-btn">&times;</span>
            </div>

            <div class="review-modal__resort">
                <img src="" alt="resort" id="modal-image">

                <div class="resort-info">
                    <h3 id="modal-name">Название курорта</h3>
                    <p id="modal-height">Высота: 2000м</p>
                    <p id="modal-rating">Рейтинг: 4.5</p>
                </div>
            </div>

            <div class="review-modal__stars">
                <button class="star">★</button>
                <button class="star">★</button>
                <button class="star">★</button>
                <button class="star">★</button>
                <button class="star">★</button>
            </div>

            <div class="review-modal__comment">
                <textarea id="review-comment" placeholder="Напишите ваш отзыв..."></textarea>
            </div>

            <button class="submit-btn">Отправить</button>

        </div>
    </div>
</div>
